name: CI

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.13'

    - name: Install uv
      run: |
        curl -LsSf https://astral.sh/uv/install.sh | sh
        echo "$HOME/.cargo/bin" >> $GITHUB_PATH

    - name: Install dependencies
      run: uv sync

    - name: Run linting
      run: |
        uv run flake8 generate.py main.py --count --select=E9,F63,F7,F82 --show-source --statistics
        uv run flake8 generate.py main.py --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

    - name: Check script syntax
      run: uv run python -m py_compile generate.py main.py